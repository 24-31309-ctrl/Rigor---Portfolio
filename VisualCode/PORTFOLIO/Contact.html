<!DOCTYPE html>

    <link rel="stylesheet" href="Contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="Pictures/LOGO.png" alt="KCVR Logo" class="main-logo">
        </div>
        <nav class="nav-container">
            <a href="Home.html" class="nav-link">Home</a>
            <a href="About me.html" class="nav-link">About Me</a>
            <a href="Project.html" class="nav-link">Projects</a>
            <a href="#" class="nav-link active">Contact</a>
        </nav>
    </header>

    <main class="contact-container">
        <div class="contact-info">
            <div class="info-item">
               <div class="icon-circle phone">
               <span>📞</span>
            </div>
               <span>+63936 942 0416</span>
            </div>
            <div class="info-item">
                <div class="icon-circle facebook">f</div>
                <span>facebook.com/kingcarlo.rigor.9</span>
            </div>
            <div class="info-item">
                <div class="icon-circle mail">✉</div>
                <span>kingvelasco1602@gmail.com</span>
            </div>
            <div class="back-button">
                <button class="circle-btn" onclick="window.location.href='Project.html'">↩</button>
            </div>
        </div>

        <form class="contact-form">
            <div class="input-group">
                <label class="label-pill">Name:</label>
                <input type="text" class="glass-input">
            </div>
            <div class="input-group">
                <label class="label-pill">Email:</label>
                <input type="email" class="glass-input">
            </div>
            <div class="input-group">
                <label class="label-pill">Phone:</label>
                <input type="text" class="glass-input">
            </div>
            <div class="input-group">
                <label class="label-pill">MESSAGE</label>
                <div class="textarea-wrapper">
                    <textarea class="glass-textarea"></textarea>
                    <button type="submit" class="send-btn">➤</button>
                </div>
            </div>
        </form>
    </main>

    <footer class="bottom-footer">
